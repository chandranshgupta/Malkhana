name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g. v0.1.0

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04' # Compiles .deb, .AppImage, and .rpm
            args: ''
          - platform: 'windows-latest' # Compiles .msi and .exe (NSIS)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          sudo apt-get install -y rpm

      - name: Set OpenSSL path (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo "OPENSSL_DIR=C:\Program Files\OpenSSL" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Malkhana Vault v__VERSION__'
          releaseBody: 'Forensic-grade air-gapped chain-of-custody app. Built with SQLCipher AES-256 and Merkle log chain auditing. Compliant with BSA §63 and BNSS §153.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
